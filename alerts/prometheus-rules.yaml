apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: todo-app-alerts
  labels:
    app: todo-api
spec:
  groups:
  - name: todo.rules
    rules:
    - alert: HighErrorRate
      expr: http_requests_received_total{status_code=~"5.."} > 5
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "High error rate on API"
        description: "The API has returned more than 5 errors in the last minute."