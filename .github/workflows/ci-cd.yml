name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/fatlumjer/finalprojectricloud

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Test the .NET app
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test .NET App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore API dependencies
        run: dotnet restore ./app/api/TodoApi.csproj

      - name: Restore Worker dependencies
        run: dotnet restore ./app/worker/worker.csproj

      - name: Build API
        run: dotnet build ./app/api/TodoApi.csproj --no-restore --configuration Release

      - name: Build Worker
        run: dotnet build ./app/worker/worker.csproj --no-restore --configuration Release

      - name: Run tests
        run: |
          if find ./app -name "*Tests.csproj" | grep -q .; then
            dotnet test ./app --no-build --configuration Release --verbosity normal
          else
            echo "No test projects found, skipping tests."
          fi

  # ─────────────────────────────────────────────
  # JOB 2 — Build & Push image to GHCR
  # ─────────────────────────────────────────────
  docker-build-push:
    name: Build & Push Image to GHCR
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────
  # JOB 3 — Update image in AKS
  # ─────────────────────────────────────────────
  deploy-to-aks:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create GHCR image pull secret
        run: |
          kubectl create secret docker-registry ghcr-auth \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update todo-api image
        run: |
          kubectl set image deployment/todo-api \
            api=${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Update todo-worker image
        run: |
          kubectl set image deployment/todo-worker \
            worker=ghcr.io/fatlumjer/todo-worker:latest

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/todo-api --timeout=120s
          kubectl rollout status deployment/todo-worker --timeout=120s